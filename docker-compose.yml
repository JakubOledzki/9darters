services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-9darters}
      MYSQL_USER: ${MYSQL_USER:-9darters}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-9darters}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-supersecret}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data-local:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://9darters:9darters@mysql:3306/9darters}
      API_PORT: ${DOCKER_API_PORT:-4000}
      APP_ORIGIN: ${DOCKER_APP_ORIGIN:-http://localhost}
      COOKIE_DOMAIN: ${DOCKER_COOKIE_DOMAIN:-localhost}
      COOKIE_SECURE: ${DOCKER_COOKIE_SECURE:-false}
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
